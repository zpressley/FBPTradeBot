name: Resolve Weekly Auction

# Pings the live bot's own auction-resolution endpoint after the Sunday
# 10am ET match/forfeit deadline, instead of resolving/committing here.
#
# This workflow used to run its own resolve_week() + git commit in this
# GitHub-hosted checkout — a SEPARATE process from the live Railway bot's
# auction_tick loop, racing it to `git push` the same files with no shared
# lock. That race is what caused the season-long "Auction Resolution
# Pending Persistence" bug (see AUCTION_RESOLUTION_RELIABILITY.md).
#
# Now there's exactly one process that ever resolves/writes/commits
# auction data: the live bot. This workflow's only job is to make sure
# that process actually gets triggered, via POST /api/admin/auction/resolve-now
# (proxied through the Cloudflare Worker, which injects the bot's API key
# server-side — no secret needed here). If the bot already resolved the
# week itself (tick loop got there first), this call is a safe no-op
# (resolve_week() is idempotent). If the bot is down, this fails loudly
# instead of silently leaving the week unresolved.

on:
  schedule:
    # Sunday 14:30 UTC (~10:30am EDT), just after the 10am ET match/forfeit deadline.
    - cron: "30 14 * * 0"
  # Allow manual runs (safe: resolve_week is idempotent via resolved_at).
  workflow_dispatch:

jobs:
  resolve-auction:
    runs-on: ubuntu-latest
    steps:
      - name: Ping live bot to resolve current auction week
        run: |
          set -e
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://fbp-auth.zpressley.workers.dev/api/admin/auction/resolve-now" \
            -H "Content-Type: application/json" \
            -d '{"admin": "GitHub Action (resolve-auction.yml)", "announce_discord": true}')
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$body"

          if [ "$http_code" != "200" ]; then
            echo "::error::Bot did not respond successfully (HTTP $http_code) — it may be down or redeploying. Auction was NOT confirmed resolved this run."
            exit 1
          fi

          persistence_confirmed=$(echo "$body" | python3 -c "import json,sys; print(json.load(sys.stdin).get('persistence_confirmed', False))" 2>/dev/null || echo "unknown")
          if [ "$persistence_confirmed" != "True" ]; then
            echo "::error::Bot responded but persistence_confirmed was not true (got: $persistence_confirmed). Check the bot's admin log channel."
            exit 1
          fi

          echo "✅ Auction resolution confirmed persisted."
