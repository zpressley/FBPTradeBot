name: Daily Data Pipeline

permissions:
  contents: write

on:
  schedule:
    # Run daily at 5am EST (10am UTC)
    - cron: "0 10 * * *"
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      TRADE_BOT_PUSH_TOKEN: ${{ secrets.FBP_TRADE_BOT_PUSH_TOKEN }}
      FBP_HUB_PUSH_TOKEN: ${{ secrets.FBP_HUB_PUSH_TOKEN }}
      BOT_API_URL: ${{ secrets.BOT_API_URL }}
      BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      EMAIL_DIGEST_DATA_DIR: email-digest/data
      FBP_HUB_DATA_DIR: fbp-hub/data

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Checkout email-digest repository
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      uses: actions/checkout@v4
      with:
        repository: zpressley/email-digest
        path: email-digest
        token: ${{ env.FBP_HUB_PUSH_TOKEN }}

    - name: Checkout fbp-hub repository
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      uses: actions/checkout@v4
      with:
        repository: "zpressley/fbp-hub"
        path: fbp-hub
        token: ${{ env.FBP_HUB_PUSH_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Smart Data Pipeline
      id: pipeline
      continue-on-error: true
      run: |
        # The smart pipeline automatically detects season phase
        # and only runs necessary updates.
        # continue-on-error is intentional here: it lets later steps still
        # commit/push whatever data DID update successfully. The final
        # "Fail run if pipeline reported failures" step below is what
        # actually surfaces this as a failed Actions run (and a GitHub
        # failure-notification email) — smart_update_all.py now exits
        # non-zero on any failed/errored/timed-out step instead of always
        # exiting 0, which is how a broken Yahoo token went unnoticed for
        # weeks previously.
        python3 data_pipeline/smart_update_all.py

    - name: Post roster sync Discord updates via bot API
      if: ${{ env.BOT_API_URL != '' && env.BOT_API_KEY != '' }}
      run: |
        if [ ! -f data/roster_sync_messages.json ]; then
          echo "No roster_sync_messages.json found — skipping Discord post."
          exit 0
        fi

        python3 - <<'PY'
        import json
        import os
        import requests
        
        path = "data/roster_sync_messages.json"
        with open(path, "r", encoding="utf-8") as f:
            payload = json.load(f)
        
        has_updates = any(payload.get(k) for k in ("immediate", "batched", "batched_prospect", "batched_nri", "batched_free_agency"))
        if not has_updates:
            print("No roster-sync updates queued — skipping Discord post.")
            raise SystemExit(0)
        
        payload["post_batched_now"] = False
        url = os.environ["BOT_API_URL"].rstrip("/") + "/api/admin/roster-sync-post"
        resp = requests.post(
            url,
            headers={"X-API-Key": os.environ["BOT_API_KEY"]},
            json=payload,
            timeout=45,
        )
        print(f"Roster-sync post status: {resp.status_code}")
        resp.raise_for_status()
        PY

    - name: Commit and push if data/ changed (fbp-trade-bot)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        PUSH_TOKEN="${TRADE_BOT_PUSH_TOKEN:-}"
        if [ -z "$PUSH_TOKEN" ]; then
          PUSH_TOKEN="${GITHUB_TOKEN:-}"
        fi
        if [ -z "$PUSH_TOKEN" ]; then
          PUSH_TOKEN="${FBP_HUB_PUSH_TOKEN:-}"
        fi
        if [ -n "$PUSH_TOKEN" ]; then
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        else
          echo "⚠️ No push token found in TRADE_BOT_PUSH_TOKEN, GITHUB_TOKEN, or FBP_HUB_PUSH_TOKEN."
        fi
        # Stage data/ and token.json (token_manager auto-refreshes expired tokens).
        # Exclude transient message queues — they're consumed by the bot, not version-controlled.
        git add data/ token.json

        # Roster-sync queue handling:
        # - If BOT API credentials exist, workflow posts queues directly to the bot API,
        #   so queue files remain transient (not committed).
        # - If credentials are missing, keep queue files in git as a fallback so the
        #   deployed bot can pick them up and post via scheduled batch tick.
        if [ -n "${BOT_API_URL:-}" ] && [ -n "${BOT_API_KEY:-}" ]; then
          git reset HEAD -- data/roster_sync_messages.json data/roster_sync_state.json 2>/dev/null || true
          echo "BOT API credentials detected; queue files excluded from commit."
        else
          echo "⚠️ BOT API credentials missing; queue files will be committed for bot-side posting fallback."
        fi

        # If there are no staged changes under data/, exit successfully
        # without committing.
        if git diff --cached --quiet; then
          echo "No data/ changes to commit."
          exit 0
        fi

        git commit -m "🔄 Daily data update - $(date)"
        git push origin HEAD:${GITHUB_REF_NAME}

    - name: Commit email-digest baseline snapshots
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      working-directory: email-digest
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        if [ -d data/baselines ]; then
          git add data/baselines/
          git diff --staged --quiet || git commit -m "Daily baseline snapshot $(date +%F)"
          git push
        else
          echo "No data/baselines/ directory yet — skipping."
        fi

    - name: Update top100_prospects.json in fbp-hub
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      run: |
        python3 data_pipeline/update_top100_prospects_for_hub.py --hub-path fbp-hub

    - name: Copy data files to fbp-hub
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      run: |
        # NOTE: managers.json is intentionally NOT a plain `cp` — fbp-hub's
        # config/managers.json holds hand/script-maintained WizBucks data
        # that this repo's config/managers.json doesn't have. Use the
        # additive merge script so identity fields (yahoo_team_id, role,
        # standing, full_name) get backfilled without clobbering WizBucks.
        # See scripts/sync_managers_to_hub.py for details.
        python3 scripts/sync_managers_to_hub.py --hub-path fbp-hub
        for f in draft_order_2026.json trades.json standings.json combined_players.json \
                 wizbucks.json auction_current.json; do
          if [ -f "data/$f" ]; then
            cp "data/$f" "fbp-hub/data/$f"
          fi
        done

    - name: Commit and push data to fbp-hub
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      working-directory: fbp-hub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A data/ config/managers.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update data from pipeline - $(date)" && git push)

    - name: Copy combined_players.json to email-digest
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      run: |
        cp data/combined_players.json email-digest/data/combined_players.json

    - name: Commit combined_players.json to email-digest
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      working-directory: email-digest
      run: |
        git config user.name "fbp-pipeline-bot"
        git config user.email "bot@fbp-pipeline"
        git add data/combined_players.json
        git diff --staged --quiet || git commit -m "chore: sync combined_players.json from trade bot $(date +%Y-%m-%d)"
        git push

    # NOTE: weekly auction resolution intentionally does NOT run here anymore.
    # Until 2026-07-13 this step AND .github/workflows/resolve-auction.yml AND
    # the live bot's own auction_tick loop (commands/auction.py) all
    # independently tried to resolve_week() + git-commit the same files every
    # Sunday, with no cross-process lock — that's what caused the recurring
    # "Auction Resolution Pending Persistence" failures all season (see
    # AUCTION_RESOLUTION_RELIABILITY.md). resolve-auction.yml is now the sole
    # scheduled resolver, timed to run after the Sunday 10am ET match/forfeit
    # deadline. Do not re-add an auction-resolve step here.

    - name: Fail run if pipeline reported failures
      if: steps.pipeline.outcome == 'failure'
      run: |
        echo "🚨 Smart Data Pipeline reported one or more failed/errored/timed-out steps."
        echo "See the 'Run Smart Data Pipeline' step output above for which script(s) failed."
        echo "This step intentionally fails the run so GitHub sends a failure notification —"
        echo "everything that could still be committed above already was."
        exit 1
