name: Daily Data Pipeline

permissions:
  contents: write

on:
  schedule:
    # Run daily at 5am EST (10am UTC)
    - cron: "0 10 * * *"
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FBP_HUB_PUSH_TOKEN: ${{ secrets.FBP_HUB_PUSH_TOKEN }}
      EMAIL_DIGEST_DATA_DIR: email-digest/data
      FBP_HUB_DATA_DIR: fbp-hub/data

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Checkout email-digest repository
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      uses: actions/checkout@v3
      with:
        repository: zpressley/email-digest
        path: email-digest
        token: ${{ env.FBP_HUB_PUSH_TOKEN }}

    - name: Checkout fbp-hub repository
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      uses: actions/checkout@v3
      with:
        repository: "zpressley/fbp-hub"
        path: fbp-hub
        token: ${{ env.FBP_HUB_PUSH_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Smart Data Pipeline
      run: |
        # The smart pipeline automatically detects season phase
        # and only runs necessary updates
        python3 data_pipeline/smart_update_all.py

    - name: Commit and push if data/ changed (fbp-trade-bot)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Stage data/ and token.json (token_manager auto-refreshes expired tokens)
        # Exclude transient message queues — they're consumed by the bot, not version-controlled.
        git add data/ token.json
        git reset HEAD -- data/roster_sync_messages.json data/roster_sync_state.json 2>/dev/null || true

        # If there are no staged changes under data/, exit successfully
        # without committing.
        if git diff --cached --quiet; then
          echo "No data/ changes to commit."
          exit 0
        fi

        git commit -m "🔄 Daily data update - $(date)"
        git push

    - name: Commit email-digest baseline snapshots
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      working-directory: email-digest
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        if [ -d data/baselines ]; then
          git add data/baselines/
          git diff --staged --quiet || git commit -m "Daily baseline snapshot $(date +%F)"
          git push
        else
          echo "No data/baselines/ directory yet — skipping."
        fi

    - name: Update top100_prospects.json in fbp-hub
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      run: |
        python3 data_pipeline/update_top100_prospects_for_hub.py --hub-path fbp-hub

    - name: Copy data files to fbp-hub
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      run: |
        cp config/managers.json fbp-hub/data/managers.json
        for f in draft_order_2026.json trades.json standings.json combined_players.json \
                 wizbucks.json auction_current.json; do
          if [ -f "data/$f" ]; then
            cp "data/$f" "fbp-hub/data/$f"
          fi
        done

    - name: Commit and push data to fbp-hub
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      working-directory: fbp-hub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update data from pipeline - $(date)" && git push)

    - name: Copy combined_players.json to email-digest
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      run: |
        cp data/combined_players.json email-digest/data/combined_players.json

    - name: Commit combined_players.json to email-digest
      if: ${{ env.FBP_HUB_PUSH_TOKEN != '' }}
      working-directory: email-digest
      run: |
        git config user.name "fbp-pipeline-bot"
        git config user.email "bot@fbp-pipeline"
        git add data/combined_players.json
        git diff --staged --quiet || git commit -m "chore: sync combined_players.json from trade bot $(date +%Y-%m-%d)"
        git push

    - name: Resolve weekly auction (Sundays only)
      if: "${{ github.event_name == 'schedule' }}"
      run: |
        # Only run on Sundays (day 0)
        if [ "$(date +%u)" = "7" ]; then
          echo "Sunday detected — resolving auction..."
          python3 scripts/resolve_auction.py
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/combined_players.json data/wizbucks.json data/wizbucks_transactions.json data/auction_current.json data/player_log.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏁 Resolve weekly auction - $(date)" && git push)
        else
          echo "Not Sunday — skipping auction resolve."
        fi
